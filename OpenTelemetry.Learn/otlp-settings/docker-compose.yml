version: "3.8"

services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Jaeger UI
      - "14268:14268" # Jaeger HTTP thrift (opcional)
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC (seu app manda aqui)
      - "4318:4318"   # OTLP HTTP (seu app pode mandar aqui)
      - "8888:8888"   # Collector metrics (opcional)
    depends_on:
      - jaeger
    restart: unless-stopped

 
